<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css?v=10">
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
    />
    <title>Login - BadXClone</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
</head>
<body id="login-page">
    <div id="app">
        <div id="header">
            <div class="header-left">
                <a href="/index.html" id="logo">
                    <i id="logo-icon" class="fa-solid fa-database"></i>
                    BadXClone
                </a>
            </div>
            <div class="header-center"></div>
            <div class="header-right"></div>
        </div>
        <div id="main">
            <div class="content-left"></div>
            <div class="content-center" id="login-center">
                <div id="login">
                    <div class="auth-header">
                        <i class="fa-solid fa-database auth-logo-icon"></i>
                        <div class="auth-title">Welcome back</div>
                        <div class="auth-subtitle">Sign in to BadXClone</div>
                    </div>
                    <form action="/api/login.php" method="POST">
                        <div class="auth-content">
                            <div class="auth-field">
                                <i class="fa-solid fa-at field-icon"></i>
                                <input type="text" class="text-input" name="identifier" placeholder="Username or email">
                            </div>
                            <div class="auth-field">
                                <i class="fa-solid fa-lock field-icon"></i>
                                <input type="password" class="text-input" name="password" placeholder="Password">
                                <i class="fa-regular fa-eye toggle-password" id="toggle-login-password"></i>
                            </div>
                        </div>
                        <div class="auth-footer">
                            <a href="#" class="forgot-link">Forgot password?</a>
                            <div class="auth-btn-row">
                                <a href="/register.html" class="auth-secondary-btn">Create account</a>
                                <button class="auth-primary-btn" type="submit">
                                    Sign in
                                    <i class="fa-solid fa-arrow-right"></i>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="content-right"></div>
        </div>
    </div>
    <script>
        const toggleBtn = document.getElementById('toggle-login-password');
        const pwField = toggleBtn.previousElementSibling;
        toggleBtn.addEventListener('click', () => {
            const isHidden = pwField.type === 'password';
            pwField.type = isHidden ? 'text' : 'password';
            toggleBtn.classList.toggle('fa-eye', !isHidden);
            toggleBtn.classList.toggle('fa-eye-slash', isHidden);
        });
    </script>
</body>
</html>
