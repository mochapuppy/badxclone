<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
    />
    <title>A Bad Twitter Clone</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
</head>
<body id="main-page">
    <div id="app">
        <div id="header">
            <div class="header-left">
                <a href="/index.html" id="logo">
                    <i id="logo-icon" class="fa-solid fa-database"></i>
                    BadXClone
                </a>
            </div>
            <div class="header-center">
                <div class="search-wrapper">
                    <div id="search-bar">
                        <i id="search-icon" class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search" placeholder="Search for anything...">
                    </div>
                </div>
            </div>
            <div class="header-right">
                <div class="header-right-button-wrapper">
                    <div id="post-btn">
                        <i id="post-icon" class="fa-solid fa-pen-to-square"></i>
                        Post
                    </div>
                    <a href="/login.html" id="login-btn">
                        <i id="login-icon" class="fa-solid fa-user"></i>
                        Login
                    </a>
                </div>
            </div>
        </div>
        <div id="main">
            <div class="content-left"></div>
            <div class="content-center">
            <div class="content-right"></div>
        </div>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
